name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".swiftformat"
      - ".swiftlint.yml"
      - "**/*.swift"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.head_ref || github.run_id }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            swift:
              - '**/*.swift'
              - '.swiftformat'
              - '.swiftlint.yml'
              - 'Package.swift'
              - 'Package.resolved'
              - '.github/workflows/ci.yml'
            markdown:
              - 'README.md'
              - 'CLAUDE.md'
              - '**/*.docc/**/*.md'
              - '.claude/**/*.md'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    needs: changes
    if: always()
    runs-on: >-
      ${{
        (needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch')
        && 'macos-26' || 'ubuntu-latest'
      }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
      # Pin lint tool versions so CI matches local `make lint` exactly and does
      # not drift when Homebrew publishes a new release.
      SWIFTLINT_VERSION: 0.63.2
      SWIFTFORMAT_VERSION: 0.61.1
    steps:
      - name: No changes detected
        if: needs.changes.outputs.swift != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Swift changes detected, skipping lint"

      - name: Checkout
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Install SwiftLint and SwiftFormat
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/lint-bin"

          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o "${RUNNER_TEMP}/swiftlint.zip"
          unzip -oq "${RUNNER_TEMP}/swiftlint.zip" -d "${RUNNER_TEMP}/swiftlint"
          install "$(find "${RUNNER_TEMP}/swiftlint" -name swiftlint -type f | head -1)" "${RUNNER_TEMP}/lint-bin/swiftlint"

          curl -fsSL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip" -o "${RUNNER_TEMP}/swiftformat.zip"
          unzip -oq "${RUNNER_TEMP}/swiftformat.zip" -d "${RUNNER_TEMP}/swiftformat"
          install "$(find "${RUNNER_TEMP}/swiftformat" -name swiftformat -type f | head -1)" "${RUNNER_TEMP}/lint-bin/swiftformat"

          echo "${RUNNER_TEMP}/lint-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/lint-bin/swiftlint" version
          "${RUNNER_TEMP}/lint-bin/swiftformat" --version

      - name: SwiftLint
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: swiftlint --strict .

      - name: SwiftFormat
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: swiftformat --lint .

  lint-markdown:
    name: Lint Markdown
    needs: changes
    if: always()
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/igorshubovych/markdownlint-cli:v0.48.0
    steps:
      - name: No changes detected
        if: needs.changes.outputs.markdown != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Markdown changes detected, skipping lint"

      - name: Checkout
        if: needs.changes.outputs.markdown == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Lint Markdown
        if: needs.changes.outputs.markdown == 'true' || github.event_name == 'workflow_dispatch'
        run: markdownlint "README.md" "CLAUDE.md" "**/*.docc/**/*.md" ".claude/**/*.md"

  build-test:
    name: Build and Test
    needs: changes
    if: always()
    runs-on: >-
      ${{
        (needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch')
        && 'macos-26' || 'ubuntu-latest'
      }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - name: No changes detected
        if: needs.changes.outputs.swift != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Swift changes detected, skipping build and test"

      - name: Checkout
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Cache Swift packages
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install xcsift
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # Drop runner-preinstalled taps Homebrew's trust policy warns about.
          brew untap aws/tap azure/bicep 2>/dev/null || true
          brew install xcsift

      - name: Build
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: set -o pipefail && swift build --build-tests -Xswiftc -warnings-as-errors 2>&1 | xcsift -f github-actions --Werror

      - name: Test
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: set -o pipefail && swift test --filter TMDbTests --enable-code-coverage --xunit-output junit.xml 2>&1 | xcsift -f github-actions

      - name: Prepare Code Coverage
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          xcrun llvm-cov export -format="lcov" \
            .build/debug/TMDbPackageTests.xctest/Contents/MacOS/TMDbPackageTests \
            -instr-profile .build/debug/codecov/default.profdata > info.lcov || \
            echo "Warning: Coverage export failed, continuing without coverage"

      - name: Upload coverage reports to Codecov
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        uses: codecov/codecov-action@v7
        with:
          files: info.lcov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: >-
          !cancelled()
          && (needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch')
        uses: codecov/codecov-action@v7
        with:
          files: ./junit-swift-testing.xml
          report_type: test_results
          flags: unit-tests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build for Release
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: set -o pipefail && swift build -c release -Xswiftc -warnings-as-errors 2>&1 | xcsift -f github-actions --Werror

  build-test-linux:
    name: Build and Test (Linux)
    needs: changes
    if: always()
    runs-on: ubuntu-latest
    container: swift:6.1-jammy
    steps:
      - name: No changes detected
        if: needs.changes.outputs.swift != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Swift changes detected, skipping build and test"

      - name: Checkout
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Build
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: swift build --build-tests -Xswiftc -warnings-as-errors

      - name: Test
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: swift test --skip-build --filter TMDbTests

      - name: Build for Release
        if: needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch'
        run: swift build -c release -Xswiftc -warnings-as-errors

  ci:
    name: CI
    if: always()
    needs: [lint, lint-markdown, build-test, build-test-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          results=( \
            "${{ needs.lint.result }}" \
            "${{ needs.lint-markdown.result }}" \
            "${{ needs.build-test.result }}" \
            "${{ needs.build-test-linux.result }}" \
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job failed or cancelled: $result"
              exit 1
            fi
          done
