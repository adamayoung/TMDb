name: Claude

on:
  pull_request:
    types: [opened, synchronize]
    # Only run the automated code review when the PR actually changes Swift
    # source (or the package manifest). Docs-only, config-only, or .claude/
    # changes carry nothing to review, so the job doesn't trigger at all.
    # @claude can still be invoked manually via a comment (the claude-respond
    # job, which is not path-filtered).
    paths:
      - '**/*.swift'
      - 'Package.resolved'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# A new push (synchronize) supersedes the in-flight review for the same PR —
# cancel it so reviews don't stack up and double-post while watch-pr iterates.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' &&
      github.event.sender.login == 'adamayoung'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat:*),Read,Glob,Grep"'
          prompt: |
            You are the GitHub Actions reviewer for the TMDb Swift package. Review
            this PR by following the project's canonical review guidelines, then
            post your findings as described below.

            ## Follow the canonical guidelines

            Read and follow `.github/CODE_REVIEW.md` (it is checked out in the
            workspace). It is the SINGLE SOURCE OF TRUTH shared with the local
            `code-reviewer` agent, so the two reviews stay aligned. It defines the
            goal, severity rubric, project context/architecture, in/out scope, and
            the output shape. Do not invent criteria — the file wins.

            ## Your environment (no MCP, no build/test) — review only what you can verify

            You have the diff and the checked-out repo, but NO MCP, NO build, and
            NO test run. Per the "capability scope" section of the guidelines:
            review what the code itself shows, and do NOT post speculative findings.
            In particular, do NOT raise model↔API accuracy, fixture-correctness, or
            "tests would fail" issues — you cannot verify them here; leave those to
            the local reviewer. At most mention "verify locally" in the summary.

            ## Adversarial re-evaluation is MANDATORY

            After your first pass, challenge every finding against the actual code
            (see the guidelines' adversarial section): verify it's real, downgrade
            or drop theoretical/false-positive/out-of-scope findings, and confirm it
            relates to this diff. Only findings that SURVIVE this pass may be posted.
            This is the filter that keeps the review quiet and trustworthy — apply
            it strictly.

            ## Where findings go (severity-gated — important)

            - **Inline comments** (via `create_inline_comment`): post ONLY surviving
              **Critical** and **High** findings, on the specific line. Use GitHub
              suggestion blocks for concrete fixes. These are the blocking,
              actionable issues.
            - **One summary comment** (via `gh pr comment`): everything else —
              **Medium** and **Low** findings (as a brief list, NOT inline threads),
              the **Strengths**, and the **Assessment** (Ready to merge? + reason).

            Do not create inline review threads for Medium/Low — they become noise
            that downstream automation must chase. Keep them advisory in the summary.
            If nothing Critical/High survives, post no inline comments and say so in
            the summary. Be concise and actionable; never mark a nitpick Critical.

  claude-respond:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.login == 'adamayoung'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
