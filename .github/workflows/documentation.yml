name: Documentation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - ".github/workflows/documentation.yml"
      - "**/*.swift"
      - "**/*.docc/**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "docs-${{ github.head_ref || github.run_id }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - '**/*.swift'
              - '**/*.docc/**'
              - '.github/workflows/documentation.yml'

  build:
    name: Build
    needs: changes
    if: always()
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: No changes detected
        if: needs.changes.outputs.docs != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Swift or DocC changes detected, skipping documentation build"

      - name: Checkout
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7

      - name: Setup Pages
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v6

      - name: Cache Swift packages
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-docs-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-docs-
            ${{ runner.os }}-swift-

      - name: Build documentation
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          swift package \
          --allow-writing-to-directory docs \
          generate-documentation \
          --target TMDb \
          --disable-indexing \
          --transform-for-static-hosting \
          --hosting-base-path TMDb \
          --output-path docs \
          --warnings-as-errors
        env:
          SWIFTCI_DOCC: 1

      - name: Upload documentation
        if: >-
          github.ref == 'refs/heads/main'
          && (needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs'

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}documentation/tmdb
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
